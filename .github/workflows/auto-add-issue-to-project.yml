name: Auto-add issues to GitHub Project

on:
  issues:
    types:
      - opened
      - reopened
      - transferred

permissions:
  contents: read
  issues: read

concurrency:
  group: issue-project-auto-add-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  add-to-project:
    name: Add issue to Project 11
    runs-on: ubuntu-latest
    env:
      PROJECT_URL: https://github.com/users/mizan0515/projects/11
      PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
    steps:
      - name: Report missing Projects token
        if: ${{ env.PROJECTS_TOKEN == '' }}
        run: |
          echo "::notice title=Project registration skipped::Set the PROJECTS_TOKEN repository secret with GitHub Projects write access to enable automatic issue registration."

      - name: Add issue to project
        if: ${{ env.PROJECTS_TOKEN != '' }}
        uses: actions/add-to-project@v2
        with:
          project-url: ${{ env.PROJECT_URL }}
          github-token: ${{ env.PROJECTS_TOKEN }}
