name: gates

# Runs the Driftless safety gates on every push and pull request.
# These are the checks behind the README badges: containment, mirror-parity,
# and Windows text-safety. A reviewer can see them pass on a clean tree here.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-gates:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Containment gate (PASS on a clean tree)
        shell: pwsh
        run: ./scripts/Test-Containment.ps1 -Path . -AllFiles

      - name: Windows text-safety gate (.ps1/.bat/.cmd ASCII + no BOM)
        shell: pwsh
        run: ./scripts/Test-WindowsTextSafety.ps1 -Root .

      - name: Mirror-parity gate (the two profiles never drift)
        shell: pwsh
        run: ./scripts/Test-ProfileMirrorParity.ps1 -Path .

      - name: Mirror-parity dynamic same-name fixtures
        shell: pwsh
        run: ./scripts/Test-ProfileMirrorParityDynamicFixtures.ps1

      - name: Skill-optimization validation harness (static, no paid LLM)
        shell: pwsh
        run: ./scripts/Test-SkillOptValidationHarness.ps1

      - name: Work-discipline gate (no unresolved placeholder shipped as a rule)
        shell: pwsh
        run: ./scripts/Test-WorkDiscipline.ps1 -Root .

      - name: Session claim guard (duplicate issue/branch/worktree/surface blocks)
        shell: pwsh
        run: ./scripts/Test-CodexSessionClaim.ps1

      - name: Primary checkout hygiene guard (dirty main blocks new work)
        shell: pwsh
        run: ./scripts/Test-PrimaryWorktreeClean.ps1 -SelfTest

      - name: Hot-context discipline gate (no AGENTS.md bloat by indirection)
        shell: pwsh
        run: ./scripts/Test-HotContextDiscipline.ps1 -Root .

      - name: Context-engineering discipline gate (compressed context stays verifiable)
        shell: pwsh
        run: ./scripts/Test-ContextEngineeringDiscipline.ps1 -Root .

      - name: Worker failure recovery contract gate
        shell: pwsh
        run: ./scripts/Test-WorkerFailureRecoveryContract.ps1 -Root .

      - name: Code-intelligence benchmark gate (compiled wiki usefulness)
        shell: pwsh
        run: ./scripts/Test-CodeIntelligenceBenchmark.ps1 -Root .

      - name: Skill-audit gate (every shipped SKILL.md is structurally sound)
        shell: pwsh
        run: ./scripts/Test-SkillAudit.ps1 -Root .

      - name: External-adoption safety gate (public-safe self-test)
        shell: pwsh
        run: ./scripts/Test-ExternalAdoptionSafetyGate.ps1 -SelfTest

      - name: Improvement-principle gate (root-cause, principle-based, no overfit)
        shell: pwsh
        run: ./scripts/Test-ImprovementPrincipleDiscipline.ps1 -Root .

      - name: Mission-control UX gate
        shell: pwsh
        run: ./scripts/Test-MissionControlUx.ps1 -Root .

      - name: Insight-inbox starter public-safety gate
        shell: pwsh
        run: ./scripts/Test-InsightInboxStarterPublicSafety.ps1 -Root .

  linux-smoke:
    # Proves the cross-platform claim off Windows: the POSIX installer runs and
    # actually materializes the isolated home, and the containment gate (pwsh is
    # preinstalled on the runner) passes on Linux too.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer dry-run (POSIX shell, changes nothing)
        shell: sh
        run: sh ./install.sh --dry-run --both

      - name: Installer real run materializes a repo-local home (and only there)
        shell: sh
        run: |
          sh ./install.sh --both --yes
          test -d .runtime/claude-home || { echo "claude-home not materialized"; exit 1; }
          test -d .runtime/codex-home  || { echo "codex-home not materialized"; exit 1; }
          # The host-global agent homes must NOT have been created or touched.
          test ! -e "$HOME/.claude" || { echo "host-global ~/.claude was touched"; exit 1; }
          echo "Linux install OK: isolated homes under .runtime, host-global untouched."

      - name: Containment gate on Linux (pwsh)
        shell: pwsh
        run: ./scripts/Test-Containment.ps1 -Path . -AllFiles
